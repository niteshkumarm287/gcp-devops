steps:

- name: 'gcr.io/cloud-builders/docker'
  args:
  - build
  - '-t'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/devops-repo/app:$COMMIT_SHA'
  - '.'

- name: 'gcr.io/cloud-builders/docker'
  args:
  - push
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/devops-repo/app:$COMMIT_SHA'

- name: 'gcr.io/cloud-builders/kubectl'
  args:
  - set
  - image
  - deployment/devops-app
  - app=us-central1-docker.pkg.dev/$PROJECT_ID/devops-repo/app:$COMMIT_SHA
  env:
  - 'CLOUDSDK_COMPUTE_REGION=us-central1'
  - 'CLOUDSDK_CONTAINER_CLUSTER=devops-cluster'